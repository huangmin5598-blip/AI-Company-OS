<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的独立站</title>
    <style>
        /* 统一颜色主题 */
        :root {
            --primary: #667eea;
            --primary-dark: #5568d3;
            --secondary: #764ba2;
            --dark: #333;
            --light: #666;
            --bg-light: #f8f9ff;
            --white: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background: var(--white);
            color: var(--dark);
        }
        
        /* 导航 - 统一深色主题 */
        nav {
            background: var(--dark);
            padding: 0 2rem;
        }
        
        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        nav a {
            color: var(--white);
            text-decoration: none;
            padding: 1rem 0;
            display: block;
            transition: color 0.3s;
        }
        
        nav a:hover {
            color: var(--primary);
        }
        
        /* 头部 - 统一渐变主题 */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: var(--white);
            padding: 2rem;
            text-align: center;
        }
        
        header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
        }
        
        header p {
            opacity: 0.9;
        }
        
        /* 主内容区 */
        main {
            flex: 1;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        
        .hero {
            text-align: center;
            padding: 3rem 1rem;
        }
        
        .hero h2 {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            color: var(--dark);
        }
        
        .hero p {
            color: var(--light);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        /* 按钮 - 统一主题色 */
        .btn {
            display: inline-block;
            padding: 0.8rem 2rem;
            background: var(--primary);
            color: var(--white);
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .btn:hover {
            background: var(--primary-dark);
        }
        
        /* 特性卡片 */
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-top: 3rem;
        }
        
        .feature-card {
            padding: 1.5rem;
            border: 1px solid #eee;
            border-radius: 8px;
            text-align: center;
            transition: box-shadow 0.3s;
        }
        
        .feature-card:hover {
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }
        
        .feature-card h3 {
            margin-bottom: 0.5rem;
            color: var(--dark);
        }
        
        .feature-card p {
            color: var(--light);
            font-size: 0.9rem;
        }
        
        /* 页脚 - 统一深色主题 */
        footer {
            background: var(--dark);
            color: var(--white);
            text-align: center;
            padding: 1.5rem;
        }
        
        footer p {
            font-size: 0.9rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
    </nav>
    
    <header>
        <h1>欢迎访问</h1>
        <p>这是我的独立网站</p>
    </header>
    
    <main>
        <section class="hero">
            <h2>发现精彩内容</h2>
            <p>这里是一个简单的独立站首页，展示基本结构和布局。我们致力于为您提供优质的内容和服务。</p>
            <a href="#" class="btn">了解更多</a>
        </section>
        
        <section class="features">
            <div class="feature-card">
                <h3>特性一</h3>
                <p>简洁优雅的设计，提升用户体验</p>
            </div>
            <div class="feature-card">
                <h3>特性二</h3>
                <p>快速加载，响应式布局适配各种设备</p>
            </div>
            <div class="feature-card">
                <h3>特性三</h3>
                <p>持续更新，不断完善功能和内容</p>
            </div>
        </section>
    </main>
    
    <footer>
        <p>&copy; 2026 我的独立站. 保留所有权利.</p>
    </footer>
</body>
</html>
