# Company Instance Configuration — Example
#
# > AI Company OS instance definition.
# > This file separates OS Core from company-specific configuration.
# > Copy this to config/company-instance.yaml and customize for your company.
# >
# > The actual config (config/company-instance.yaml) is in .gitignore —
# > DO NOT commit real instance data to the repository.
#
# Taxonomy reference:
#   - config/runtime-manifest.yaml       — available runtimes (shared)
#   - config/capability-manifest.yaml    — available actors & capabilities (shared)
#   - config/safe-output-policy.yaml     — output format & redaction rules (shared)

company:
  name: "My AI Company"
  founder_name: "Founder"
  version: "0.28"

# ── Company Identity ──────────────────────────
# Display settings — these affect UI language, time zone, and public evidence visibility.
display:
  language: "zh-CN"                  # zh-CN / en-US — affects CEO Brief, templates, UI
  timezone: "Asia/Shanghai"
  public_evidence: true               # Whether to include this instance in public evidence dashboards
  company_logo: ""                    # Optional: path or URL to company logo

# ── Runtime Selection ─────────────────────────
# Reference runtime IDs defined in config/runtime-manifest.yaml.
# Only runtimes listed here and enabled: true will be initialized.
runtimes:
  - runtime_id: hermes-local
    enabled: true

  - runtime_id: openclaw-local
    enabled: true

  - runtime_id: codex-stub
    enabled: false                    # placeholder — enable when Codex CLI is available

  - runtime_id: claude-code-stub
    enabled: false                    # placeholder — enable when Claude Code CLI is available

# ── Business Lines ────────────────────────────
# High-level business areas the company operates in.
# Each line maps to product_line_registry entries in the OS Core.
business_lines:
  - name: ai-company-os-development
    description: "Build and maintain AI Company OS itself"
    leads: ["ceo-agent"]

# Example additional lines:
# - name: short-drama-production
#   description: "AI-powered short drama content creation"
#   leads: ["ceo-agent"]
# - name: amazon-ecommerce
#   description: "Cross-border e-commerce operations"
#   leads: ["lead-amz"]

# ── Schedules ──────────────────────────────────
# Scheduled tasks that drive the Daily Operating Loop.
# These override or supplement the defaults in backend/config/scheduled_work_orders.yaml.
schedules: []
# Example:
# - task_id: "daily-system-health-brief"
#   cadence: "daily"
#   time: "09:00"
#   enabled: true

# ── Notification Channels ─────────────────────
# Where the AI Company OS can send notifications.
notification_channels: []
# Example:
# - type: feishu
#   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/..."
# - type: email
#   to: "founder@mycompany.com"

# ── Approval Policy ───────────────────────────
# Controls whether actions require founder confirmation.
approval_policy:
  default_requires_approval: true
  allow_auto_approval: false
  # Optional: define auto-approval rules for low-risk actions
  # auto_approval_rules:
  #   - max_cost_tokens: 5000
  #     allowed_categories: ["read", "search"]
