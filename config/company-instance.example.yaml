# Company Instance Configuration — Example

> **AI Company OS instance definition.**
> This file separates OS Core from company-specific configuration.
> Copy this to `config/company-instance.yaml` and customize for your company.

```yaml
# ──────────────────────────────────────────────
# AI Company OS — Company Instance Config
# ──────────────────────────────────────────────

company:
  name: "My AI Company"
  founder_name: "Founder"
  version: "0.4.1"

# ── Runtime Registration ─────────────────────
# Each runtime is an AI agent execution environment.
# v0.6: Runtime Layer MVP — these are auto-seeded from seed_runtimes.py.
# The seeds below reflect the actual 4 runtimes registered at startup.
runtimes:
  - runtime_id: hermes-local
    runtime_type: hermes
    display_name: "Hermes Agent"
    adapter_module: "app.runtime.adapters.hermes_adapter"
    endpoint: null
    enabled: true

  - runtime_id: openclaw-local
    runtime_type: openclaw
    display_name: "OpenClaw Gateway"
    adapter_module: "app.runtime.adapters.openclaw_adapter"
    endpoint: "http://localhost:18789"
    enabled: true

  - runtime_id: codex-stub
    runtime_type: codex
    display_name: "Codex"
    adapter_module: "app.runtime.adapters.codex_stub"
    endpoint: null
    enabled: false  # placeholder — enable when Codex CLI is available

  - runtime_id: claude-code-stub
    runtime_type: claude_code
    display_name: "Claude Code"
    adapter_module: "app.runtime.adapters.claude_code_stub"
    endpoint: null
    enabled: false  # placeholder — enable when Claude Code CLI is available

# ── Business Lines ───────────────────────────
# High-level business areas the company operates in.
business_lines: []
# Example:
# - name: short-drama-production
#   description: AI-powered short drama content creation
#   leads: ["ceo-agent"]
# - name: amazon-ecommerce
#   description: Cross-border e-commerce operations
#   leads: ["lead-amz"]

# ── Notification Channels ────────────────────
# Where the AI Company OS can send notifications.
notification_channels: []
# Example:
# - type: feishu
#   webhook_url: "https://open.feishu.cn/open-apis/bot/v2/hook/..."
# - type: email
#   to: "founder@mycompany.com"

# ── Approval Policy ──────────────────────────
# Controls whether actions require founder confirmation.
approval_policy:
  default_requires_approval: true
  allow_auto_approval: false
  # Optional: define auto-approval rules
  # auto_approval_rules:
  #   - max_cost_tokens: 5000
  #     allowed_categories: ["read", "search"]
```

> See `docs/architecture/PRODUCTIZATION-ARCHITECTURE.md` for the full OS Core / Company Instance architecture.
