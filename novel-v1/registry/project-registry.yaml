## 字段说明

| 字段 | 说明 |
|------|------|
| project_id | 唯一标识 |
| project_name | 项目名称 |
| project_type | 类型：content/tool/research/ops |
| status | active/paused/completed/killed |
| owner | 负责人 |
| created_at | 创建时间 |
| last_updated_at | 最后更新时间 |
| related_assets | 关联资产 ID 列表 |
| total_assets | 资产总数 |
| completed_tasks | 已完成任务数 |