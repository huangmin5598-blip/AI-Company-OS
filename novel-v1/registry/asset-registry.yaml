## 字段说明

| 字段 | 说明 |
|------|------|
| asset_id | 唯一标识 (asset-{project}-{type}-{seq}) |
| project_id | 所属项目 |
| asset_type | 类型：novel/markdown/docx/article等 |
| title | 标题 |
| summary | 摘要 |
| status | published/archived/draft |
| version | v1/v2 |
| created_by | 创建者 |
| source_task | 来源任务 |
| review_status | pending/passed/failed |
| copyright_status | unchecked/low/medium/high |
| publish_status | unpublished/ready/published |
| file_path | 文件路径 |
| tags | 标签 |
| created_at | 创建时间 |
| updated_at | 更新时间 |